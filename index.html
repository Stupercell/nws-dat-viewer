<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>NWS Damage Assessment Toolkit</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  >

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <!-- TOP BAR -->
  <div id="topbar">

    <div id="topbarTitle">
      NWS Damage Assessment Toolkit
    </div>

    <div id="topbarControls">

      <label>
        Begin Date:
      </label>

      <input
        type="date"
        id="startDate"
      >

      <label>
        End Date:
      </label>

      <input
        type="date"
        id="endDate"
      >

      <select id="stateFilter">

        <option value="">
          All States
        </option>

      </select>

      <button id="applyFilters">
        Submit
      </button>

      <button id="resetFilters">
        Reset
      </button>

    </div>

  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">

    <div class="sidebarSection">

      <div class="sidebarTitle">
        Damage Viewer Layers
      </div>

      <div class="layerRow">

        <input
          type="checkbox"
          id="toggleTracks"
          checked
        >

        <span>
          Damage Lines
        </span>

      </div>

      <div class="layerRow">

        <input
          type="checkbox"
          id="togglePoints"
          checked
        >

        <span>
          Damage Points
        </span>

      </div>

      <div class="layerRow">

        <input
          type="checkbox"
          id="togglePolygons"
          checked
        >

        <span>
          Damage Polygons
        </span>

      </div>

    </div>

    <div class="sidebarSection">

      <div class="sidebarTitle">
        EF Scale
      </div>

      <div class="efRow">
        <span class="triangle ef5"></span>
        EF5
      </div>

      <div class="efRow">
        <span class="triangle ef4"></span>
        EF4
      </div>

      <div class="efRow">
        <span class="triangle ef3"></span>
        EF3
      </div>

      <div class="efRow">
        <span class="triangle ef2"></span>
        EF2
      </div>

      <div class="efRow">
        <span class="triangle ef1"></span>
        EF1
      </div>

      <div class="efRow">
        <span class="triangle ef0"></span>
        EF0
      </div>

      <div class="efRow">
        <span class="triangle efu"></span>
        EFU
      </div>

    </div>

    <div class="sidebarSection">

      <div class="sidebarTitle">
        Statistics
      </div>

      <div class="statRow">
        <span>Tornado Count</span>
        <span id="statTotal">0</span>
      </div>

      <div class="statRow">
        <span>Strongest Rating</span>
        <span id="statStrongest">N/A</span>
      </div>

      <div class="statRow">
        <span>States Visible</span>
        <span id="statStates">0</span>
      </div>

    </div>

  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- DETAILS -->
  <div id="detailsPanel" class="hidden">

    <div id="detailsHeader">

      <span>
        Feature Details
      </span>

      <button id="closePanel">
        ✕
      </button>

    </div>

    <div id="detailsContent">

      Select a feature.

    </div>

  </div>

  <!-- LOADING -->
  <div id="loadingScreen">

    <div class="spinner"></div>

    <div class="loadingText">
      Loading DAT Data...
    </div>

  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="app.js"></script>

</body>

</html>
