<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>NWS DAT Viewer</title>

  <!-- LEAFLET -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <!-- YOUR CSS -->
  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <!-- MOBILE FILTER BUTTON -->
  <button id="mobileFilterToggle">
    ☰ Filters
  </button>

  <!-- SIDEBAR -->
  <div id="sidebar">

    <div class="sidebar-header">

      <h1>NWS DAT Viewer</h1>

      <p>
        Modern NOAA Damage Assessment Toolkit Viewer
      </p>

    </div>

    <!-- SEARCH -->

    <div class="filter-group">

      <label>
        Search
      </label>

      <input
        type="text"
        id="searchInput"
        placeholder="City, County, Event ID..."
      >

    </div>

    <!-- DATE FILTERS -->

    <div class="filter-group">

      <label>
        Start Date
      </label>

      <input
        type="date"
        id="startDate"
      >

    </div>

    <div class="filter-group">

      <label>
        End Date
      </label>

      <input
        type="date"
        id="endDate"
      >

    </div>

    <!-- STATE -->

    <div class="filter-group">

      <label>
        State
      </label>

      <select id="stateFilter">

        <option value="">
          All States
        </option>

      </select>

    </div>

    <!-- QUICK FILTERS -->

    <div class="quick-filters">

      <button class="quickFilterBtn" data-days="1">
        Today
      </button>

      <button class="quickFilterBtn" data-days="7">
        7 Days
      </button>

      <button class="quickFilterBtn" data-days="30">
        30 Days
      </button>

      <button class="quickFilterBtn" data-days="365">
        1 Year
      </button>

    </div>

    <!-- APPLY -->

    <button id="applyFilters">
      Apply Filters
    </button>

    <!-- STATS -->

    <div id="statsPanel">

      <h3>Statistics</h3>

      <div class="stat-row">
        <span>Total Tornadoes</span>
        <span id="statTotal">0</span>
      </div>

      <div class="stat-row">
        <span>Strongest Rating</span>
        <span id="statStrongest">N/A</span>
      </div>

      <div class="stat-row">
        <span>Visible States</span>
        <span id="statStates">0</span>
      </div>

    </div>

    <!-- LEGEND -->

    <div id="legend">

      <h3>EF Scale</h3>

      <div class="legend-item">
        <span class="legend-color ef0"></span>
        EF0
      </div>

      <div class="legend-item">
        <span class="legend-color ef1"></span>
        EF1
      </div>

      <div class="legend-item">
        <span class="legend-color ef2"></span>
        EF2
      </div>

      <div class="legend-item">
        <span class="legend-color ef3"></span>
        EF3
      </div>

      <div class="legend-item">
        <span class="legend-color ef4"></span>
        EF4
      </div>

      <div class="legend-item">
        <span class="legend-color ef5"></span>
        EF5
      </div>

      <div class="legend-item">
        <span class="legend-point"></span>
        Damage Point
      </div>

    </div>

  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- DETAILS PANEL -->
  <div id="detailsPanel" class="hidden">

    <button id="closePanel">
      ✕
    </button>

    <div id="detailsContent">

      <h2>Select a feature</h2>

      <p>
        Click a tornado path or damage point.
      </p>

    </div>

  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="hidden">

    <button id="closeLightbox">
      ✕
    </button>

    <img
      id="lightboxImage"
      src=""
    >

  </div>

  <!-- LOADING -->
  <div id="loadingScreen">

    <div class="spinner"></div>

    <div class="loading-text">
      Loading NOAA DAT Data...
    </div>

  </div>

  <!-- LEAFLET -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- YOUR JS -->
  <script src="app.js"></script>

</body>
</html>
