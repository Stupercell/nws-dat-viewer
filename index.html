<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>NWS DAT Viewer</title>

  <!-- LEAFLET -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <!-- YOUR CSS -->
  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <!-- SIDEBAR -->
  <div id="sidebar">

    <div class="sidebar-header">

      <h1>NWS DAT Viewer</h1>

      <p>
        Modern NOAA Damage Assessment Toolkit Viewer
      </p>

    </div>

    <!-- FILTERS -->

    <div class="filter-group">

      <label>
        Start Date
      </label>

      <input
        type="date"
        id="startDate"
      >

    </div>

    <div class="filter-group">

      <label>
        End Date
      </label>

      <input
        type="date"
        id="endDate"
      >

    </div>

    <div class="filter-group">

      <label>
        State
      </label>

      <select id="stateFilter">

        <option value="">
          All States
        </option>

      </select>

    </div>

    <button id="applyFilters">
      Apply Filters
    </button>

    <!-- LEGEND -->

    <div id="legend">

      <h3>EF Scale</h3>

      <div class="legend-item">
        <span
          class="legend-color"
          style="background:#22c55e;"
        ></span>
        EF0
      </div>

      <div class="legend-item">
        <span
          class="legend-color"
          style="background:#eab308;"
        ></span>
        EF1
      </div>

      <div class="legend-item">
        <span
          class="legend-color"
          style="background:#f97316;"
        ></span>
        EF2
      </div>

      <div class="legend-item">
        <span
          class="legend-color"
          style="background:#ef4444;"
        ></span>
        EF3
      </div>

      <div class="legend-item">
        <span
          class="legend-color"
          style="background:#d946ef;"
        ></span>
        EF4
      </div>

      <div class="legend-item">
        <span
          class="legend-color"
          style="background:#7e22ce;"
        ></span>
        EF5
      </div>

    </div>

  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- DETAILS PANEL -->
  <div id="detailsPanel" class="hidden">

    <button id="closePanel">
      ✕
    </button>

    <div id="detailsContent">

      <h2>Select a tornado</h2>

      <p>
        Click a tornado path or damage point to view details.
      </p>

    </div>

  </div>

  <!-- LOADING -->
  <div id="loadingScreen">

    <div class="spinner"></div>

    <div class="loading-text">
      Loading NOAA DAT Data...
    </div>

  </div>

  <!-- LEAFLET -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- YOUR JS -->
  <script src="app.js"></script>

</body>
</html>
