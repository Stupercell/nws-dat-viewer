<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NWS Damage Assessment Toolkit</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <link rel="stylesheet" href="style.css?v=7">
</head>

<body>

  <div id="topbar">

    <div id="title">
      NWS Damage Assessment Toolkit
    </div>

    <div id="toolbar">

      <label>Begin Date:</label>
      <input type="date" id="startDate">

      <label>End Date:</label>
      <input type="date" id="endDate">

      <select id="stateFilter">
        <option value="">All States</option>
      </select>

      <button id="applyFilters">
        Submit
      </button>

    </div>

  </div>

  <div id="sidebar">

    <div class="sidebarSection">

      <div class="sectionTitle">
        Damage Viewer Layers
      </div>

      <div class="layerItem">
        <input type="checkbox" id="toggleTracks" checked>
        <span>Damage Lines</span>
      </div>

      <div class="layerItem">
        <input type="checkbox" id="togglePoints" checked>
        <span>Damage Points</span>
      </div>

      <div class="layerItem">
        <input type="checkbox" id="togglePolygons" checked>
        <span>Damage Polygons</span>
      </div>

    </div>

    <div class="sidebarSection">

      <div class="sectionTitle">
        EF Scale
      </div>

      <div class="legendItem">
        <span class="triangle ef5"></span> EF5
      </div>

      <div class="legendItem">
        <span class="triangle ef4"></span> EF4
      </div>

      <div class="legendItem">
        <span class="triangle ef3"></span> EF3
      </div>

      <div class="legendItem">
        <span class="triangle ef2"></span> EF2
      </div>

      <div class="legendItem">
        <span class="triangle ef1"></span> EF1
      </div>

      <div class="legendItem">
        <span class="triangle ef0"></span> EF0
      </div>

      <div class="legendItem">
        <span class="triangle efu"></span> EFU
      </div>

    </div>

    <div class="sidebarSection">

      <div class="sectionTitle">
        Statistics
      </div>

      <div class="statRow">
        <span>Tornado Count</span>
        <span id="statTotal">0</span>
      </div>

      <div class="statRow">
        <span>Strongest Rating</span>
        <span id="statStrongest">N/A</span>
      </div>

      <div class="statRow">
        <span>States Visible</span>
        <span id="statStates">0</span>
      </div>

    </div>

  </div>

  <div id="map"></div>

  <div id="detailsPanel" class="hidden">

    <div id="detailsHeader">

      <span>
        Feature Details
      </span>

      <button id="closePanel">
        ✕
      </button>

    </div>

    <div id="detailsContent">
      Click a feature on the map.
    </div>

  </div>

  <div id="loadingScreen">

    <div class="spinner"></div>

    <div class="loadingText">
      Loading DAT Data...
    </div>

  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js?v=7"></script>

</body>
</html>
